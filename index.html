<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.O">
        <title>CSS Example</title>
        <link rel="stylesheet" href="style.css">
        <style>
            h2{
                color:hotpink;
            }
        </style>
    </head>
    <body>
        <h1 class="myclass">Hello World</h1>
        <h2>This is internal CSS</h2>
        <h3 class="class1 class2">
            This is example of multiple classes
        </h3>
        <p id="para">This is external CSS</p>
        <p>HELLO FRIENDS</p>
        <p style="color:red;background-color: pink;">
            This is inline CSS
        </p>
    </body>
</html>

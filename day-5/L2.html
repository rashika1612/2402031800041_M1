<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>while loop example</title>
</head>
<body>
    <p id="demo">2. while loop even numbers</p>
    <script>
        let i=2;
        let text="";
        while(i<=10) {
            text+=i+"<br>";
            i+=2;
        }
        document.getElementById("demo").innerHTML=text;
    </script>
</body>
</html>

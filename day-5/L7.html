<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for loop  example</title>
</head>
<body>
    <p id="demo">7. for loop stars pattern</p>
    <script>
        let text="";
        for(let i=1;i<=5;i++){
            text+="*".repeat(i)+"<br>";
        }
        document.getElementById("demo").innerHTML=text;
    </script>
</body>
</html>

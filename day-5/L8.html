<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>while loop example</title>
</head>
<body>
    <p id="demo">8. while loop countdown</p>
    <script>
        let i=5;
        let text="";
        while(i>=1){
            text+=i+"<br>";
            i--;
        }
        document.getElementById("demo").innerHTML=text;
    </script>
</body>
</html>

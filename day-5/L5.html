<!DOCTYPE html>
<html>
    <body>
        <p id="demo">for loop</p>
        <script>
            let students=["Sam","Simba","Oreo","Brownie"];
            let text="";
            for(let i=0;i<students.length;i++){
                text+=students[i] + "<br>";
            }
            document.getElementById("demo").innerHTML=text;
        </script>
    </body>
</html>

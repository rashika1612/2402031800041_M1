<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>do while example</title>
</head>
<body>
    <p id="demo">9. do while loop sum of 1 to 5</p>
    <script>
        let i=1;
        let sum=0;
        do{
            sum+=i;
            i++;
        }
        while(i<=5);
        document.getElementById("demo").innerHTML="Sum="+sum;
    </script>
</body>
</html>

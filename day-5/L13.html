<!DOCTYPE html>
<html>
    <body>
        <p id="demo"></p>
        <script>
            let text="";
            for(let i=1;i<=3;i++){
                for(let j=1;j<=3;j++){
                    text+=i+"<br>";
                }
                text+="<br>";
            }
            document.getElementById("demo").innerHTML=text;
        </script>
</html>

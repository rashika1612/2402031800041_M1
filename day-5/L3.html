<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>do while example</title>
</head>
<body>
    <p id="demo">3. do while loop print 1 to 5</p>
    <script>
        let i=1;
        let text="";
        do{
            text +=i + "<br>";
            i++;
        }
        while(i<=5);
        document.getElementById("demo").innerHTML=text;
    </script>
</body>
</html>

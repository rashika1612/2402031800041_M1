<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>while loop example</title>
</head>
<body>
    <p id="demo">1. While loop print 1 to 5</p>
    <script>
        let i=1;
        let text="";
        while(i<=10) {
            text+=i+"<br>";
            i++;
        }
        document.getElementById("demo").innerHTML=text;
    </script>
</body>
</html>

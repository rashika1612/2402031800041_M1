<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>do while loop example</title>
</head>
<body>
    <p id="demo">4. do while loop table of 2</p>
    <script>
        let i=1;
        let text="";
        do{
            text += "2 x " + i + " = " + (2*i) + "<br>";
            i++;
        }
        while(i<=10);
        document.getElementById("demo").innerHTML=text;
    </script>
</body>
</html>

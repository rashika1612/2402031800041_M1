<!DOCTYPE html>
<html>
    <body>
        <p id="demo">continue loop</p>
        <script>
            let text="";
            for(let i=1;i<=10;i++){
                if(i==5){
                    continue;
                }
                text+=i+"<br>";
            }
            document.getElementById("demo").innerHTML=text;
        </script>
    </body>
</html>

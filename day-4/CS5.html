<!DOCTYPE html>
<html>
    <body>
        <p id="result"></p>
        <script>
            let temp = prompt("Enter temperature:");
            if(temp>30)
            document.getElementById("result").innerHTML="Hot";
        else if(temp>=20)
        document.getElementById("result").innerHTML="Warm";
    else
    document.getElementById("result").innerHTML="Cold";
        </script>
    </body>
</html>

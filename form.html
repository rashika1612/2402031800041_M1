<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Form</title>
<style>
table{
    background-color: lightgreen;
}
</style>
</head>
<body>
<form>
<table border="1" cellspacing="5">
<caption><b>Registration Form</b></caption>
<tr align="center">
    <td colspan="2">First Name:</td>
    <td width="300" align="left">
        <input type="text" placeholder="Enter your first name"  required>
    </td>
</tr>
<tr align="center">
    <td colspan="2">Last Name:</td>
    <td width="300" align="left">
        <input type="text" placeholder="Enter your last name"  required>
    </td>
</tr>
<tr align="center">
    <td colspan="2">Contact no:</td>
    <td width="300" align="left">
        <input type="number" placeholder="Enter your contact no" required>
    </td>
</tr>
<tr align="center">
    <td colspan="2">Landline no:(079-123456)</td>
    <td width="300" align="left">
        <input type="text" placeholder="xxxxxxxxxx"  required>
    </td>
</tr>
<tr align="center">
    <td colspan="2">Email:</td>
    <td width="300" align="left">
        <input type="email" placeholder="Enter your email"  required>
    </td>
</tr>
<tr align="center">
    <td colspan="2">Password:</td>
    <td width="300" align="left">
        <input type="password" placeholder="Enter new password"  required>
    </td>
</tr>
<tr align="center">
    <td colspan="2">Date of Birth:</td>
    <td width="300" align="left">
        <input type="date"  required>
    </td>
</tr>
<tr align="center">
    <td colspan="2">Age:</td>
    <td width="300" align="left">
        <input type="number" placeholder="Enter age"  required>
    </td>
</tr>
<tr align="center">
    <td colspan="2">Gender:</td>
    <td width="300" align="left">
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
    </td>
</tr>
<tr align="center">
    <td colspan="2">Address:</td>
    <td width="300" align="left">
        <input type="text" placeholder="Enter address"  required>
    </td>
</tr>
<tr align="center">
    <td colspan="2">City:</td>
    <td width="300" align="left">
        <select>
            <option>Select city</option>
            <option>city 1</option>
        </select>
    </td>
</tr>
<tr align="center">
    <td colspan="2">Pin code:</td>
    <td width="300" align="left">
        <input type="number" placeholder="enter pin code" required>
    </td>
</tr>
<tr align="center">
    <td colspan="2">Join date:</td>
    <td width="300" align="left">
        <input type="date"  required>
    </td>
</tr>
<tr align="center">
    <td colspan="2">Confirm your form:</td>
    <td width="300" align="left">
        <input type="submit">
        <input type="reset">
    </td>
</tr>
</table>
</form>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>object example</title>
</head>
<body>
    <script>
        var person = new Object(); // Assign fields to object "person"
        person.firstName = "Rashika";
        person.lastName = "Singhaniya"; // Assign a method to object "person"
        person.sayHi = ()=>{
        alert("Welcome " + person.firstName + " " + person.lastName)
        }
        person.sayHi(); // Call the method in "person"
</script>
</body>
</html>

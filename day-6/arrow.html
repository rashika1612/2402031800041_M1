<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>arrow function example</title>
</head>
<body>
    <script>
        let welcome=function(name){
            return `Hello & Welcome ${name}`;
        }
        console.log(welcome("rashika"));
    </script>

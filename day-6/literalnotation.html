<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>object literal notation</title>
</head>
<body>
     <script>
        var person = {firstName: "Rashika", lastName:"Singhaniya",
        sayHi : function() 
        {
        alert("Hi! " + person.firstName + " " + person.lastName);
        }
        }
        person.sayHi(); // Call the method in "person"
</script>
</body>
</html>

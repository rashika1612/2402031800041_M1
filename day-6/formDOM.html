<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form using DOM</title>
</head>
<body>
     <form name="myForm">
        <label for="uname">Username</label>
        <input type="text" name="uname"><br>
        
        <label for="pword">Password</label>
        <input type="text" name="pword">

        <input type="button" value="Login" onclick="f()">
    </form>

    <script>
        function f()
        {
            var a = document.forms["myForm"];
            var u = a.uname.value;
            var p = a.pword.value;

            if(u == "admin" && p == "123")
            {
                alert("Valid");
            }
            else
            {
                alert("Invalid");
            }
        }
        </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email validation example</title>
</head>
<body>
     <input type="text" id="myText" placeholder="Enter Email">

    <button onclick="checkMail()">Check</button>

    <script>

        function checkMail()
        {
            var a = document.getElementById("myText").value;

            var pattern = "/^[^\s@]+@[^\s@]+\.[^\s@]+$/";

            if(pattern.test(a))
            {
                alert("Valid");
            }
            else
            {
                alert("Invalid");
            }
        }
        </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CSS Example</title>
        <link rel="stylesheet" href="style.css">
        <style>
            h2{
                color: rgb(99,154,27);
            }
        </style>
    </head>
    <body>
        <h1 class="myclass">Hello World</h1>
    <h2>this is internal css</h2>
    <h3 class="class1 class2">This is example of multiple classes</h3>
    <h4>multiple selection</h4>
    <h5>multiple selection</h5>
    <div><h1>multilevel selection (this is h1 inside div tag)</h1></div>
    <p id="para">This is external css</p>
    <p>HELLO FRIENDS</p>
    <p style="color:red; background-color:pink;">this is inline css</p>
    </body>
</html>
